<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>หน้าแรก</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&family=Sarabun:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080b12;
    --glass: rgba(255,255,255,0.055);
    --glass-strong: rgba(255,255,255,0.10);
    --glass-hover: rgba(255,255,255,0.13);
    --border: rgba(255,255,255,0.12);
    --border-glow: rgba(120,180,255,0.35);
    --accent: #5eb8ff;
    --accent2: #a78bfa;
    --glow: rgba(94,184,255,0.18);
    --glow2: rgba(167,139,250,0.14);
    --text: #e8f0ff;
    --text-muted: rgba(200,220,255,0.45);
    --shadow: 0 8px 40px rgba(0,0,0,0.55);
    --shadow-glow: 0 0 32px rgba(94,184,255,0.12);
    /* gyroscope offset — set by JS */
    --gx: 0px;
    --gy: 0px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'Sarabun',sans-serif;
    background:var(--bg); color:var(--text);
    min-height:100vh; overflow:hidden; position:relative;
    touch-action:none;
  }

  /* ---- Background ---- */
  #bg-photo {
    position:fixed; inset:0;
    background-size:cover; background-position:center; z-index:0;
    transform: translate(calc(var(--gx)*-0.5), calc(var(--gy)*-0.5));
    transition: transform .08s linear;
  }
  #bg-photo::after {
    content:''; position:absolute; inset:0;
    background: linear-gradient(135deg,rgba(8,11,18,.72) 0%,rgba(8,11,18,.38) 50%,rgba(8,11,18,.78) 100%);
  }
  /* Ambient glow blobs */
  #bg-photo::before {
    content:''; position:absolute; inset:0; z-index:1;
    background:
      radial-gradient(ellipse 60% 40% at 20% 30%, rgba(94,184,255,.08) 0%, transparent 60%),
      radial-gradient(ellipse 50% 35% at 80% 70%, rgba(167,139,250,.07) 0%, transparent 60%);
    pointer-events:none;
  }

  .container {
    position:relative; z-index:1; min-height:100vh;
    display:flex; flex-direction:column; align-items:center;
    padding:0 16px; pointer-events:none;
  }
  .container > * { pointer-events:all; }

  /* ---- Clock — gyro parallax ---- */
  .clock-block {
    margin-top:clamp(60px,10vh,120px); text-align:center;
    animation:fadeUp .8s ease both;
    transform: translate(calc(var(--gx)*1.8), calc(var(--gy)*1.8));
    transition: transform .08s linear;
    position:relative;
  }
  .clock {
    font-family:'Kanit',sans-serif;
    font-size:clamp(58px,10vw,100px);
    font-weight:300; letter-spacing:-3px; line-height:1;
    color:#fff;
    text-shadow:
      0 0 40px rgba(94,184,255,.55),
      0 0 80px rgba(94,184,255,.25),
      0 2px 4px rgba(0,0,0,.5);
    filter: drop-shadow(0 0 18px rgba(94,184,255,.4));
  }
  .date {
    font-size:clamp(13px,2vw,15px); color:var(--text-muted); margin-top:10px;
    letter-spacing:.5px;
    text-shadow: 0 0 12px rgba(94,184,255,.3);
  }

  /* ---- Search — gyro parallax ---- */
  .search-wrap {
    margin-top:clamp(28px,5vh,52px); width:100%; max-width:600px;
    animation:fadeUp .8s .15s ease both;
    transform: translate(calc(var(--gx)*1.1), calc(var(--gy)*1.1));
    transition: transform .08s linear;
  }
  .search-box {
    display:flex; align-items:center;
    background: rgba(255,255,255,0.07);
    backdrop-filter:blur(28px) saturate(160%); -webkit-backdrop-filter:blur(28px) saturate(160%);
    border:1px solid var(--border);
    border-radius:20px; padding:0 20px; gap:12px;
    transition:border-color .25s, box-shadow .25s;
    box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,.1), var(--shadow-glow);
  }
  .search-box:focus-within {
    border-color: var(--border-glow);
    box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,.15),
                0 0 0 3px rgba(94,184,255,.12),
                0 0 48px rgba(94,184,255,.18);
  }
  .search-icon { flex-shrink:0; opacity:.45; color:var(--accent); }
  .search-box input {
    flex:1; background:transparent; border:none; outline:none;
    color:var(--text); font-family:'Sarabun',sans-serif; font-size:17px; padding:18px 0;
  }
  .search-box input::placeholder { color:var(--text-muted); }

  .suggest-list {
    background:rgba(10,14,24,.92); backdrop-filter:blur(28px);
    border:1px solid var(--border); border-top:none;
    border-radius:0 0 20px 20px; overflow:hidden; display:none;
    box-shadow: 0 16px 40px rgba(0,0,0,.5);
  }
  .suggest-list.show { display:block; }
  .suggest-item {
    padding:12px 20px; font-size:15px; cursor:pointer;
    display:flex; align-items:center; gap:10px;
    color:var(--text-muted); transition:background .15s,color .15s;
  }
  .suggest-item:hover { background:var(--glass-hover); color:var(--text); }
  .suggest-item svg { color:var(--accent); opacity:.5; }
  .search-wrap.open .search-box { border-radius:20px 20px 0 0; border-bottom-color:transparent; }

  /* ---- Shortcuts ---- */
  .shortcut-float {
    position:fixed;
    display:flex; flex-direction:column; align-items:center; gap:6px;
    padding:10px 6px 8px;
    background: rgba(255,255,255,0.07);
    backdrop-filter:blur(20px) saturate(150%); -webkit-backdrop-filter:blur(20px) saturate(150%);
    border:1px solid rgba(255,255,255,0.13);
    border-radius:16px; cursor:pointer; color:var(--text);
    box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,.1);
    user-select:none; -webkit-user-select:none; touch-action:none;
    z-index:10; overflow:visible;
    transition:border-color .2s, box-shadow .2s;
  }
  .shortcut-float:hover {
    border-color:rgba(94,184,255,.4);
    box-shadow:var(--shadow), inset 0 1px 0 rgba(255,255,255,.15), 0 0 24px rgba(94,184,255,.15);
  }
  .shortcut-float.dragging { opacity:.88; border-color:var(--accent); box-shadow:0 20px 60px rgba(0,0,0,.7),0 0 30px rgba(94,184,255,.2); z-index:100; }
  .shortcut-float.resizing { border-color:var(--accent); z-index:100; }

  .shortcut-float .sc-icon {
    border-radius:10px; display:flex; align-items:center; justify-content:center;
    background:rgba(255,255,255,.08); overflow:hidden; flex-shrink:0;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.15);
  }
  .shortcut-float .sc-icon img { width:75%; height:75%; object-fit:contain; }
  .shortcut-float .sc-label {
    color:var(--text-muted); text-align:center; line-height:1.3;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; width:100%;
  }

  /* Delete badge */
  .shortcut-float .del-btn {
    position:absolute; top:-9px; right:-9px;
    width:22px; height:22px; border-radius:50%;
    background:#e53e3e; border:2px solid var(--bg);
    color:#fff; font-size:12px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; z-index:15;
    opacity:0; transform:scale(.3);
    transition:opacity .15s, transform .15s; pointer-events:none;
  }
  body.edit-mode .shortcut-float .del-btn { opacity:1; transform:scale(1); pointer-events:all; animation:wiggle .35s ease infinite alternate; }
  body.edit-mode .shortcut-float { animation:wiggle .35s ease infinite alternate; }

  /* Resize handle */
  .shortcut-float .resize-handle {
    position:absolute; bottom:-1px; right:-1px;
    width:18px; height:18px; cursor:nwse-resize;
    display:none; align-items:flex-end; justify-content:flex-end;
    padding:3px; z-index:20; touch-action:none;
  }
  .shortcut-float .resize-handle svg { opacity:.4; color:var(--accent); }
  body.edit-mode .shortcut-float .resize-handle { display:flex; }
  body.edit-mode .shortcut-float .resize-handle:hover svg { opacity:1; }

  /* Add button */
  #add-shortcut {
    position:fixed; right:16px; bottom:80px;
    display:flex; flex-direction:column; align-items:center; gap:6px; padding:12px 8px;
    background:rgba(255,255,255,.05); backdrop-filter:blur(20px);
    border:1px dashed rgba(94,184,255,.25); border-radius:16px;
    cursor:pointer; color:var(--text-muted);
    width:76px; z-index:10; transition:all .2s;
    touch-action:none; user-select:none;
  }
  #add-shortcut:hover { background:var(--glass-hover); border-color:rgba(94,184,255,.55); color:var(--accent); }
  #add-shortcut .sc-icon { width:36px; height:36px; border-radius:10px; background:rgba(255,255,255,.07); display:flex; align-items:center; justify-content:center; font-size:22px; }
  #add-shortcut .sc-label { font-size:10px; text-align:center; }

  @keyframes wiggle { from{transform:rotate(-1.8deg)} to{transform:rotate(1.8deg)} }

  /* Edit hint */
  #edit-hint {
    position:fixed; top:16px; left:50%; transform:translateX(-50%);
    background:rgba(8,11,18,.85); backdrop-filter:blur(16px);
    border:1px solid var(--border-glow); border-radius:20px;
    color:var(--accent); font-size:12px; font-family:'Kanit',sans-serif;
    padding:6px 18px; z-index:200;
    opacity:0; pointer-events:none; transition:opacity .2s; white-space:nowrap;
    box-shadow:0 0 20px rgba(94,184,255,.12);
  }
  body.edit-mode #edit-hint { opacity:1; }

  /* Stats */
  .stats {
    margin-top:auto; margin-bottom:24px;
    display:flex; gap:clamp(12px,3vw,36px); justify-content:center;
    animation:fadeUp .8s .35s ease both;
  }
  .stat {
    text-align:center;
    background:rgba(255,255,255,.06); backdrop-filter:blur(20px) saturate(140%);
    border:1px solid var(--border); border-radius:16px; padding:12px 20px; min-width:100px;
    box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,.08);
  }
  .stat-value { font-family:'Kanit',sans-serif; font-size:22px; font-weight:600; color:var(--accent); text-shadow:0 0 16px rgba(94,184,255,.4); }
  .stat-label { font-size:11px; color:var(--text-muted); margin-top:2px; line-height:1.4; }

  .photo-credit { position:fixed; bottom:12px; left:16px; font-size:11px; color:rgba(255,255,255,.25); z-index:2; }
  .bg-btn {
    position:fixed; top:16px; right:16px; z-index:10;
    background:rgba(255,255,255,.07); backdrop-filter:blur(16px);
    border:1px solid var(--border); border-radius:10px;
    color:var(--text-muted); font-size:18px;
    width:40px; height:40px; display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition:all .2s;
  }
  .bg-btn:hover { background:var(--glass-hover); color:var(--text); border-color:var(--border-glow); }

  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none} }
</style>
</head>
<body>

<div id="bg-photo"></div>
<div class="photo-credit" id="photo-credit">ภาพถ่ายโดย Venti Views</div>
<button class="bg-btn" id="bg-btn" title="เปลี่ยนพื้นหลัง">🖼</button>
<div id="edit-hint">โหมดแก้ไข · ลาก=ย้าย · ลากมุม/บีบนิ้ว=ปรับขนาด · แตะนอก=ออก</div>

<div class="container">
  <div class="clock-block">
    <div class="clock" id="clock">00:00</div>
    <div class="date" id="date-str"></div>
  </div>
  <div class="search-wrap" id="search-wrap">
    <div class="search-box">
      <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search-input" placeholder="ค้นหา Google หรือพิมพ์ URL" autocomplete="off" spellcheck="false">
    </div>
    <div class="suggest-list" id="suggest-list"></div>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-value" id="stat-blocks">0</div><div class="stat-label">บล็อก<br>แอปติดตาม</div></div>
    <div class="stat"><div class="stat-value" id="stat-data">0 KB</div><div class="stat-label">ข้อมูลที่บันทึก<br>โดยประมาณ</div></div>
    <div class="stat"><div class="stat-value" id="stat-time">0s</div><div class="stat-label">ประหยัดเวลา<br>โดยประมาณ</div></div>
  </div>
</div>

<div id="add-shortcut">
  <div class="sc-icon">＋</div>
  <div class="sc-label">เพิ่มใหม่</div>
</div>

<script>
const SEARCH_URL = 'https://www.google.com/search?q=';
const BG_IMAGES = [
  {url:'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=1920&q=80',credit:'Venti Views'},
  {url:'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1920&q=80',credit:'Samuel Ferrara'},
  {url:'https://images.unsplash.com/photo-1540959733332-eab4deabeeaf?w=1920&q=80',credit:'Jezael Melgoza'},
  {url:'https://images.unsplash.com/photo-1519681393784-d120267933ba?w=1920&q=80',credit:'Benjamin Voros'},
  {url:'https://images.unsplash.com/photo-1426604966848-d7adac402bff?w=1920&q=80',credit:'Luca Bravo'},
];
const DEFAULT_SHORTCUTS = [
  {label:'YouTube',url:'https://youtube.com',      x:.05,y:.35,size:76},
  {label:'GitHub', url:'https://github.com',       x:.05,y:.50,size:76},
  {label:'Gmail',  url:'https://mail.google.com',  x:.05,y:.65,size:76},
  {label:'Maps',   url:'https://maps.google.com',  x:.85,y:.35,size:76},
  {label:'X',      url:'https://x.com',            x:.85,y:.50,size:76},
  {label:'Reddit', url:'https://reddit.com',       x:.85,y:.65,size:76},
];
const MIN_SIZE=52, MAX_SIZE=160;

let state = JSON.parse(localStorage.getItem('nt3_state')||'null') || {
  shortcuts:DEFAULT_SHORTCUTS,
  bgIndex:0, blocks:0, dataSaved:0, timeSaved:0
};
const save = () => localStorage.setItem('nt3_state', JSON.stringify(state));

function getFavicon(url){
  try{return `https://www.google.com/s2/favicons?domain=${new URL(url).origin}&sz=64`;}
  catch{return `https://www.google.com/s2/favicons?domain=${url}&sz=64`;}
}
function clamp(v,lo,hi){return Math.min(Math.max(v,lo),hi);}

// ---- Clock ----
function updateClock(){
  const n=new Date();
  document.getElementById('clock').textContent=`${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
  const days=['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'];
  const months=['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
  document.getElementById('date-str').textContent=`วัน${days[n.getDay()]}ที่ ${n.getDate()} ${months[n.getMonth()]} ${n.getFullYear()+543}`;
}
updateClock(); setInterval(updateClock,1000);

// ---- Background ----
function setBg(idx){
  state.bgIndex=idx; save();
  const b=BG_IMAGES[idx%BG_IMAGES.length];
  document.getElementById('bg-photo').style.backgroundImage=`url('${b.url}')`;
  document.getElementById('photo-credit').textContent=`ภาพถ่ายโดย ${b.credit}`;
}
setBg(state.bgIndex);
document.getElementById('bg-btn').addEventListener('click',()=>setBg((state.bgIndex+1)%BG_IMAGES.length));

// ---- Search ----
const inp=document.getElementById('search-input'),sw=document.getElementById('search-wrap'),sl=document.getElementById('suggest-list');
const HIST=['youtube','github.com','google translate','weather','maps'];
inp.addEventListener('input',()=>{
  const q=inp.value.trim();
  if(!q){sl.classList.remove('show');sw.classList.remove('open');return;}
  const sg=[q,...HIST.filter(s=>s.startsWith(q.toLowerCase())&&s!==q)].slice(0,5);
  sl.innerHTML=sg.map(s=>`<div class="suggest-item" data-q="${s}"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>${s}</div>`).join('');
  sl.querySelectorAll('.suggest-item').forEach(it=>it.addEventListener('click',()=>doSearch(it.dataset.q)));
  sl.classList.add('show');sw.classList.add('open');
});
inp.addEventListener('keydown',e=>{if(e.key==='Enter')doSearch(inp.value.trim());if(e.key==='Escape'){sl.classList.remove('show');sw.classList.remove('open');}});
document.addEventListener('click',e=>{if(!sw.contains(e.target)){sl.classList.remove('show');sw.classList.remove('open');}});
function doSearch(q){
  if(!q)return;
  const url=(q.startsWith('http')||(q.includes('.')&&!q.includes(' ')))?(q.startsWith('http')?q:'https://'+q):SEARCH_URL+encodeURIComponent(q);
  state.blocks+=Math.floor(Math.random()*5)+1; state.dataSaved+=Math.floor(Math.random()*50)+10; state.timeSaved+=Math.random()*.5;
  save(); updateStats(); window.location.href=url;
}

// ---- Edit mode ----
let editMode=false;
function setEditMode(v){editMode=v;document.body.classList.toggle('edit-mode',v);}

// ---- Apply size to element ----
function applySize(el, size){
  const s = clamp(size, MIN_SIZE, MAX_SIZE);
  const iconSz = Math.round(s * 0.47);
  const fontSize = clamp(Math.round(s * 0.13), 9, 14);
  el.style.width = s + 'px';
  const icon = el.querySelector('.sc-icon');
  if(icon){ icon.style.width=iconSz+'px'; icon.style.height=iconSz+'px'; }
  const label = el.querySelector('.sc-label');
  if(label) label.style.fontSize = fontSize + 'px';
}

// ---- Render shortcuts ----
let floats=[];
function renderShortcuts(){
  floats.forEach(f=>f.remove()); floats=[];
  state.shortcuts.forEach((s,i)=>{
    const el=document.createElement('div');
    el.className='shortcut-float';
    el.innerHTML=`
      <button class="del-btn">✕</button>
      <div class="sc-icon"><img src="${getFavicon(s.url)}" alt="${s.label}" onerror="this.style.display='none';this.parentNode.textContent='🔗'"></div>
      <div class="sc-label">${s.label}</div>
      <div class="resize-handle" title="ลากเพื่อปรับขนาด">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor">
          <path d="M9 1L1 9M5 9L9 5M9 9L9 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
    `;

    const sz = s.size || 76;
    const px = clamp((s.x||.05)*window.innerWidth,  0, window.innerWidth  - sz);
    const py = clamp((s.y||.3) *window.innerHeight, 0, window.innerHeight - sz*1.2);
    el.style.left = px+'px'; el.style.top = py+'px';
    applySize(el, sz);

    document.body.appendChild(el); floats.push(el);

    // --- Delete ---
    el.querySelector('.del-btn').addEventListener('click',e=>{
      e.stopPropagation();
      state.shortcuts.splice(i,1); save(); renderShortcuts();
      if(!state.shortcuts.length) setEditMode(false);
    });

    // ============================================================
    // DRAG (move) — pointer events on the main element
    // ============================================================
    let dragActive=false, dragMoved=false, dStartX, dStartY, dOrigL, dOrigT;

    function dragDown(e){
      if(e.target.closest('.del-btn')||e.target.closest('.resize-handle')) return;
      // ignore second touch (handled by pinch)
      if(e.isPrimary===false) return;
      dragActive=true; dragMoved=false;
      dStartX=e.clientX; dStartY=e.clientY;
      dOrigL=parseFloat(el.style.left); dOrigT=parseFloat(el.style.top);
      el.setPointerCapture(e.pointerId);
      e.stopPropagation();
    }
    function dragMove(e){
      if(!dragActive) return;
      const dx=e.clientX-dStartX, dy=e.clientY-dStartY;
      if(Math.abs(dx)>4||Math.abs(dy)>4){ dragMoved=true; }
      if(dragMoved && editMode){
        const curSz = state.shortcuts[i].size||76;
        el.style.left=clamp(dOrigL+dx, 0, window.innerWidth -curSz)+'px';
        el.style.top =clamp(dOrigT+dy, 0, window.innerHeight-curSz*1.2)+'px';
        el.classList.add('dragging');
      }
      e.preventDefault();
    }
    function dragUp(e){
      if(!dragActive) return;
      dragActive=false; el.classList.remove('dragging');
      if(dragMoved && editMode){
        state.shortcuts[i].x=parseFloat(el.style.left)/window.innerWidth;
        state.shortcuts[i].y=parseFloat(el.style.top)/window.innerHeight;
        save(); return;
      }
      if(!dragMoved){
        if(editMode) return;
        const now=Date.now();
        if(now-lastTap<400){ clearTimeout(tapTimer); tapTimer=null; lastTap=0; setEditMode(true); }
        else { lastTap=now; tapTimer=setTimeout(()=>{ tapTimer=null; lastTap=0; window.location.href=s.url; },400); }
      }
    }
    let lastTap=0, tapTimer=null;
    el.addEventListener('pointerdown', dragDown, {passive:false});
    el.addEventListener('pointermove', dragMove, {passive:false});
    el.addEventListener('pointerup',   dragUp);
    el.addEventListener('pointercancel',()=>{ dragActive=false; el.classList.remove('dragging'); });

    // ============================================================
    // RESIZE — corner handle (mouse/touch via pointer events)
    // ============================================================
    const rh = el.querySelector('.resize-handle');
    let rActive=false, rStartX, rStartDist, rOrigSz;
    rh.addEventListener('pointerdown',e=>{
      e.stopPropagation(); e.preventDefault();
      rActive=true; rOrigSz=state.shortcuts[i].size||76; rStartX=e.clientX;
      rh.setPointerCapture(e.pointerId);
    });
    rh.addEventListener('pointermove',e=>{
      if(!rActive) return;
      const delta=e.clientX-rStartX;
      const newSz=clamp(rOrigSz+delta, MIN_SIZE, MAX_SIZE);
      state.shortcuts[i].size=newSz; applySize(el,newSz);
      el.classList.add('resizing');
      e.preventDefault();
    });
    rh.addEventListener('pointerup',  e=>{ rActive=false; el.classList.remove('resizing'); save(); });
    rh.addEventListener('pointercancel',()=>{ rActive=false; el.classList.remove('resizing'); });

    // ============================================================
    // PINCH TO RESIZE — two-finger touch on the shortcut itself
    // ============================================================
    let pinchActive=false, pinchStartDist=0, pinchOrigSz=0;
    el.addEventListener('touchstart',e=>{
      if(e.touches.length===2 && editMode){
        pinchActive=true;
        const t=e.touches;
        pinchStartDist=Math.hypot(t[0].clientX-t[1].clientX, t[0].clientY-t[1].clientY);
        pinchOrigSz=state.shortcuts[i].size||76;
        e.preventDefault();
      }
    },{passive:false});
    el.addEventListener('touchmove',e=>{
      if(!pinchActive||e.touches.length<2) return;
      const t=e.touches;
      const dist=Math.hypot(t[0].clientX-t[1].clientX, t[0].clientY-t[1].clientY);
      const ratio=dist/pinchStartDist;
      const newSz=clamp(Math.round(pinchOrigSz*ratio), MIN_SIZE, MAX_SIZE);
      state.shortcuts[i].size=newSz; applySize(el,newSz);
      e.preventDefault();
    },{passive:false});
    el.addEventListener('touchend',e=>{
      if(pinchActive){ pinchActive=false; save(); e.preventDefault(); }
    },{passive:false});
  });
}

// ---- Add shortcut ----
document.getElementById('add-shortcut').addEventListener('click',()=>{
  setEditMode(false);
  const label=prompt('ชื่อ shortcut:'); if(!label) return;
  const raw=prompt('URL: (เช่น https://example.com)'); if(!raw) return;
  const url=raw.startsWith('http')?raw:'https://'+raw;
  state.shortcuts.push({label,url,x:.4,y:.42,size:76});
  save(); renderShortcuts();
});

// ---- Tap outside → exit edit ----
document.addEventListener('pointerdown',e=>{
  if(!editMode) return;
  if(!e.target.closest('.shortcut-float')&&!e.target.closest('#add-shortcut')) setEditMode(false);
},{passive:true});

renderShortcuts();

// ---- Stats ----
function updateStats(){
  document.getElementById('stat-blocks').textContent=state.blocks.toLocaleString();
  const kb=state.dataSaved;
  document.getElementById('stat-data').textContent=kb>1024?(kb/1024).toFixed(1)+' MB':kb+' KB';
  const t=state.timeSaved;
  document.getElementById('stat-time').textContent=t<1?Math.round(t*1000)+'ms':t.toFixed(1)+'s';
}
updateStats();
</script>
